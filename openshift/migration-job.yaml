apiVersion: batch/v1
kind: Job
metadata:
  name: fastapi-scraper-migrate
  labels:
    app: fastapi-scraper
  annotations:
    image.openshift.io/triggers: |-
      [{"from":{"kind":"ImageStreamTag","name":"fastapi-scraper:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"migrate\")].image"}]
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: fastapi-scraper
        role: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: fastapi-scraper:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: fastapi-scraper-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
